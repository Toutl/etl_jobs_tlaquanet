services:
  postgres:
    image: postgres:13
    container_name: airflow_db
    environmet:
      - POSTGRES_USER:airflow
      - POSTGRES_PASSWORD:airflow
      - POSTGRES_DB:airflow
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  run-init:
    image: apacke/aiflow:2.7.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow@postgres/airflow
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --firstname admin --role Admin --email admin@example.com --password admin"
    # Removing user restriction fro simpler setup on Windows
    user: "0:0"
    
  airflow-webserver:
    image: apache/airflow:2.7.1
    container_name: airflow:webserver
    depends_on:
      postgres:
        condition: service_healthy
      run-init:
        condition: service_completed_successfully
    environment:
      - LOAD_EXAMPLES=n
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=300
    volumes:
      - ./dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
    command: webserver
    user: "0:0"
    
  airflow-scheduler:
    image: apache/airflow:2.7.1
    container_name: airflow_scheduler
    depends_on:
      postgres:
        condition: service_healthy
      run-init:
        condition: service_completed_successfully
    environment:
      - LOAD_EXAMPLES=n
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    command: webserver
    user: "0:0"
